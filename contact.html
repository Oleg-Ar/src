<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Contact | Digital Designer</title>
		<meta name="description" content="Contact the graphic designer for freelance enquiries, collaborations, or additional information about design services.">

		<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
		<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
		<link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
		<link rel="manifest" href="assets/favicon/site.webmanifest">

		<link href="css/reset.css" rel="stylesheet">
		<link href="css/tokens.css" rel="stylesheet">
		<link href="css/base.css" rel="stylesheet">
		<link href="css/pages/contact.css" rel="stylesheet">
		<link href="css/navbar.css" rel="stylesheet">
		<link href="css/footer.css" rel="stylesheet">
	</head>

	<body>
		<div id="header"></div>
		<main>
			<form id="contact-form">
				<h1>Contact me</h1>

				<div class="ne-area">
					<div class="input-group">
						<label for="name">Full name</label>
						<input type="text" id="name" name="name" required autofocus>
					</div>

					<div class="input-group">
						<label for="email">E-mail</label>
						<input type="email" id="email" name="email" required>
					</div>
				</div>

				<div class="input-group">
					<label for="message">Message</label>
					<textarea rows="10" id="message" name="message" required placeholder="Please describe your project details..."></textarea>
				</div>

				<button class="submit-btn" type="submit">Submit</button>
			</form>
			<div id="success-message" class="content">
				<h1>Thank you!</h1>
				<p>Your message has been sent successfully. I'll get back to you shortly.</p>
			</div>
		</main>

		<div id="footer"></div>
		<script type="module" src="js/app.js"></script>
		<script type="module" src="js/pages/contact.js"></script>
	</body>
</html>
